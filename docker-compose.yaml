services:

  backend:
    build:
      context: ./app/backend
    ports:
      - "8000:8000"
    env_file:
      - ./app/backend/.env
    volumes:
      - ./app/backend:/app

  frontend:
    environment:
    - API_URL=http://backend:8000
    build:
      context: ./app/frontend
    ports:
      - "8501:8501"
    volumes:
      - ./app/frontend:/app
    depends_on:
      - backend
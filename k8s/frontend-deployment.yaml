apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ai-resume-analyzer
  labels:
    app: frontend
spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: <AWS_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/ai-resume-analyzer-frontend:IMAGE_TAG
        imagePullPolicy: Always

        ports:
          - containerPort: 8501

        env:
          - name: API_URL
            valueFrom:
              configMapKeyRef:
                name: ai-resume-analyzer-config
                key: API_URL

        readinessProbe:
          httpGet:
            path: /stcore/health
            port: 8501
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        livenessProbe:
          httpGet:
            path: /stcore/health
            port: 8501
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3

        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"
